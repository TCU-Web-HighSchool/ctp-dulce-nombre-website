backend:
  name: git-gateway
  branch: main

# Archivos multimedia se guardan en public/uploads
media_folder: "public/uploads"
public_folder: "/uploads"

# Descomenta para usar el CMS en local
# local_backend: true

collections:
  # --- Noticias y Anuncios ---
  - name: "noticias"
    label: "Noticias y Anuncios"
    label_singular: "Noticia"
    description: "Publica noticias, anuncios y avisos importantes del colegio. Aparecen en la página de Noticias."
    folder: "src/content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Título de la noticia", name: "title", widget: "string", hint: "Ejemplo: Matrícula 2026 ya está abierta" }
      - { label: "Fecha de publicación", name: "date", widget: "datetime" }
      - label: "Categoría"
        name: "category"
        widget: "select"
        hint: "Selecciona la categoría que mejor describe esta noticia"
        options:
          - { label: "Académico", value: "Académico" }
          - { label: "Deportes", value: "Deportes" }
          - { label: "Cultural", value: "Cultural" }
          - { label: "General", value: "General" }
      - { label: "Imagen destacada", name: "img", widget: "image", required: false, hint: "Imagen principal que aparece en la tarjeta de la noticia" }
      - { label: "Resumen", name: "desc", widget: "text", hint: "Texto corto que aparece bajo el título (2-3 líneas)" }
      - { label: "Marcar como nuevo", name: "isNew", widget: "boolean", default: true, hint: "Muestra la etiqueta 'Nuevo' en la tarjeta" }
      - { label: "Es aviso importante", name: "isImportant", widget: "boolean", default: false, hint: "Aviso destacado con borde punteado (sin imagen)" }
      - { label: "Borrador", name: "draft", widget: "boolean", default: false, hint: "No se muestra en el sitio hasta desmarcar" }

  # --- Bolsa de Empleo ---
  - name: "empleos"
    label: "Bolsa de Empleo"
    label_singular: "Oferta de Empleo"
    description: "Agrega ofertas laborales para egresados y estudiantes. Aparecen en la Bolsa de Empleo."
    folder: "src/content/jobs"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Puesto / Cargo", name: "title", widget: "string", hint: "Ejemplo: Desarrollador(a) Frontend Junior" }
      - { label: "Empresa", name: "company", widget: "string" }
      - { label: "Ubicación", name: "location", widget: "string", hint: "Ejemplo: San José, CR o Remoto" }
      - label: "Tipo de contrato"
        name: "type"
        widget: "select"
        options:
          - { label: "Tiempo completo", value: "Tiempo completo" }
          - { label: "Medio tiempo", value: "Medio tiempo" }
          - { label: "Pasantía", value: "Pasantía" }
          - { label: "Contrato temporal", value: "Contrato" }
      - label: "Área técnica"
        name: "area"
        widget: "select"
        hint: "Especialidad técnica relacionada con el puesto"
        options:
          - "Informática"
          - "Electromecánica"
          - "Secretariado"
          - "Electrónica"
          - "Contabilidad"
          - "Turismo"
          - "General"
      - { label: "Descripción del puesto", name: "description", widget: "text", hint: "Descripción corta (aparece en la tarjeta)" }
      - label: "Etiquetas / Habilidades"
        name: "tags"
        widget: "list"
        hint: "Palabras clave como: React, JavaScript, Excel, etc."
        field: { label: "Etiqueta", name: "tag", widget: "string" }
      - { label: "Logo de la empresa", name: "logo", widget: "image", required: false }
      - { label: "URL para aplicar", name: "applyUrl", widget: "string", required: false, hint: "Enlace externo para enviar solicitud" }
      - { label: "Fecha de publicación", name: "date", widget: "datetime" }
      - { label: "Fecha de expiración", name: "expiryDate", widget: "datetime", required: false }
      - { label: "Activa", name: "active", widget: "boolean", default: true, hint: "Desmarca para ocultar la oferta" }

  # --- Preguntas Frecuentes ---
  - name: "faq"
    label: "Preguntas Frecuentes"
    label_singular: "Pregunta"
    description: "Administra las preguntas y respuestas que aparecen en la página de FAQ."
    folder: "src/content/faq"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Pregunta", name: "q", widget: "string", hint: "¿Cuáles son los requisitos de admisión?" }
      - { label: "Respuesta", name: "a", widget: "text", hint: "Respuesta clara y concisa" }
      - label: "Categoría"
        name: "category"
        widget: "select"
        options:
          - { label: "Matrícula", value: "Matrícula" }
          - { label: "Académico", value: "Académico" }
          - { label: "Administrativo", value: "Administrativo" }
      - { label: "Orden", name: "order", widget: "number", default: 0, hint: "Número menor aparece primero" }
      - { label: "Visible", name: "active", widget: "boolean", default: true }

  # --- Programas Académicos ---
  - name: "programas"
    label: "Programas Académicos"
    label_singular: "Programa"
    description: "Especialidades técnicas del colegio. Aparecen en la página Académico."
    folder: "src/content/programs"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Nombre del programa", name: "title", widget: "string", hint: "Ejemplo: Desarrollo de Software" }
      - { label: "Ícono (Material Symbol)", name: "icon", widget: "string", hint: "Nombre del ícono de Material Symbols, ej: terminal, memory, calculate" }
      - { label: "Descripción corta", name: "summary", widget: "text", hint: "Resumen de 1-2 oraciones del programa" }
      - { label: "Descripción completa", name: "body", widget: "markdown" }
      - { label: "Duración", name: "duration", widget: "string", default: "Programa de 3 Años" }
      - { label: "Orden de aparición", name: "order", widget: "number", default: 0 }
      - { label: "Activo", name: "active", widget: "boolean", default: true }
      - label: "PDF del Plan de Estudios"
        name: "planPdf"
        widget: "file"
        required: false
        hint: "Sube el PDF del plan de estudios completo. Si no hay PDF, el botón de descarga no se muestra."
        media_library:
          config:
            multiple: false
      - label: "Plan de Estudios por Año"
        name: "curriculumByYear"
        widget: "list"
        hint: "Organiza las materias por año (Décimo, Undécimo, Duodécimo)"
        fields:
          - { label: "Año / Nivel", name: "year", widget: "string", hint: "Ej: Décimo Año" }
          - label: "Materias"
            name: "subjects"
            widget: "list"
            hint: "Lista de materias impartidas en este año"
            field: { label: "Materia", name: "subject", widget: "string" }

  # --- Configuración del Sitio ---
  - name: "configuracion"
    label: "Configuración del Sitio"
    description: "Edita los textos, imágenes y contenido de cada página del sitio web."
    files:
      # General
      - label: "Datos Generales del Colegio"
        name: "general"
        file: "src/content/settings/general.json"
        description: "Nombre, contacto y redes sociales del colegio"
        fields:
          - { label: "Nombre del colegio", name: "schoolName", widget: "string" }
          - { label: "Eslogan", name: "tagline", widget: "string", hint: "Frase corta que aparece debajo del nombre" }
          - { label: "Teléfono", name: "phone", widget: "string" }
          - { label: "Correo electrónico", name: "email", widget: "string" }
          - { label: "Dirección", name: "address", widget: "text" }
          - { label: "Facebook URL", name: "facebookUrl", widget: "string", required: false }
          - { label: "Instagram URL", name: "instagramUrl", widget: "string", required: false }
          - { label: "LinkedIn URL", name: "linkedinUrl", widget: "string", required: false }

      # Página de Inicio
      - label: "Página de Inicio"
        name: "home"
        file: "src/content/settings/home.json"
        description: "Hero, estadísticas y tarjetas de acceso rápido"
        fields:
          - { label: "Etiqueta del hero (badge)", name: "heroBadge", widget: "string", hint: "Ejemplo: Admisiones Abiertas 2024-2025" }
          - { label: "Título principal", name: "heroTitle", widget: "string", hint: "Usa **texto** para resaltar en azul. Ejemplo: Formando **Profesionales** para el Futuro." }
          - { label: "Descripción del hero", name: "heroDescription", widget: "text" }
          - { label: "Texto del botón", name: "heroCtaLabel", widget: "string" }
          - { label: "Enlace del botón", name: "heroCtaLink", widget: "string", hint: "Ruta interna. Ejemplo: /academic" }
          - { label: "Imagen del hero", name: "heroImage", widget: "image" }
          - { label: "Número destacado (badge)", name: "heroBadgeValue", widget: "string", hint: "Ejemplo: 25+" }
          - { label: "Texto del badge", name: "heroBadgeLabel", widget: "string", hint: "Ejemplo: Años de Excelencia" }
          - label: "Estadísticas"
            name: "stats"
            widget: "list"
            hint: "Las 4 cifras que aparecen debajo del hero"
            max: 4
            fields:
              - { label: "Valor", name: "value", widget: "string", hint: "Ejemplo: 1500+" }
              - { label: "Etiqueta", name: "label", widget: "string", hint: "Ejemplo: Egresados" }
          - { label: "Título de Acceso Rápido", name: "quickAccessTitle", widget: "string" }
          - label: "Tarjetas de Acceso Rápido"
            name: "quickAccessCards"
            widget: "list"
            hint: "Las 3 tarjetas de acceso rápido debajo de las estadísticas"
            max: 3
            fields:
              - { label: "Imagen", name: "img", widget: "image" }
              - { label: "Texto alternativo", name: "alt", widget: "string" }
              - { label: "Ícono (Material Symbol)", name: "icon", widget: "string", hint: "Ejemplo: how_to_reg, precision_manufacturing" }
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descripción", name: "desc", widget: "text" }
              - { label: "Texto del enlace", name: "link", widget: "string" }
              - { label: "Ruta del enlace", name: "to", widget: "string", hint: "Ejemplo: /admissions, /academic, /about" }

      # Página Acerca de
      - label: "Página Acerca del Colegio"
        name: "about"
        file: "src/content/settings/about.json"
        description: "Historia, misión, visión, instalaciones y servicios"
        fields:
          - { label: "Imagen del hero", name: "heroImage", widget: "image" }
          - { label: "Título del hero", name: "heroTitle", widget: "string" }
          - { label: "Subtítulo del hero", name: "heroSubtitle", widget: "text" }
          - { label: "Badge del hero", name: "heroBadge", widget: "string", hint: "Ejemplo: Desde 1974" }
          - label: "Línea de Tiempo"
            name: "timeline"
            widget: "list"
            hint: "Eventos históricos importantes del colegio"
            fields:
              - { label: "Año", name: "year", widget: "string" }
              - { label: "Título del evento", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }
              - { label: "Destacado", name: "isHighlighted", widget: "boolean", default: false, hint: "Resalta este evento con color primario" }
          - label: "Misión"
            name: "mission"
            widget: "object"
            fields:
              - { label: "Ícono", name: "icon", widget: "string", hint: "Material Symbol, ej: flag" }
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }
          - label: "Visión"
            name: "vision"
            widget: "object"
            fields:
              - { label: "Ícono", name: "icon", widget: "string", hint: "Material Symbol, ej: visibility" }
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }
          - label: "Instalaciones"
            name: "facilities"
            widget: "list"
            hint: "Fotos y descripción de los espacios del colegio"
            fields:
              - { label: "Nombre", name: "name", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }
              - { label: "Foto", name: "image", widget: "image" }
          - label: "Servicios Estudiantiles"
            name: "services"
            widget: "list"
            hint: "Servicios como transporte, biblioteca, etc."
            fields:
              - { label: "Ícono", name: "icon", widget: "string" }
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }
              - label: "Características"
                name: "features"
                widget: "list"
                field: { label: "Característica", name: "feature", widget: "string" }
          - { label: "Título del Himno", name: "anthemTitle", widget: "string" }
          - label: "Estrofas del Himno"
            name: "anthemVerses"
            widget: "list"
            hint: "Cada estrofa del himno institucional"
            field: { label: "Estrofa", name: "verse", widget: "text" }
          - label: "Imágenes Históricas"
            name: "historyImages"
            widget: "list"
            hint: "Fotos antiguas o históricas del colegio"
            field: { label: "Imagen", name: "image", widget: "image" }
          - { label: "Título de Personal Administrativo", name: "staffSectionTitle", widget: "string", default: "Personal Administrativo" }
          - { label: "Subtítulo de Personal Administrativo", name: "staffSectionSubtitle", widget: "text", hint: "Descripción breve que aparece bajo el título de la sección" }
          - label: "Personal Administrativo"
            name: "staff"
            widget: "list"
            hint: "Director/a, coordinadores y jefes de departamento"
            fields:
              - { label: "Nombre completo", name: "name", widget: "string", hint: "Ejemplo: María González Rodríguez" }
              - { label: "Cargo / Rol", name: "role", widget: "string", hint: "Ejemplo: Directora, Coordinador Académico, Jefa de Departamento" }
              - { label: "Descripción del rol", name: "description", widget: "text", hint: "Breve descripción de las responsabilidades del cargo" }
              - { label: "Fotografía", name: "photo", widget: "image", required: false, hint: "Si no se carga una foto, se muestra una imagen de placeholder" }

      # Página Académico
      - label: "Página Académico"
        name: "academic"
        file: "src/content/settings/academic.json"
        description: "Especialidades, calendario, becas y contenido de la página Académico"
        fields:
          - { label: "Título de la página", name: "pageTitle", widget: "string" }
          - { label: "Subtítulo de la página", name: "pageSubtitle", widget: "text" }
          - label: "Pestañas de navegación"
            name: "tabs"
            widget: "list"
            hint: "Nombres de las pestañas (ej: Colegio Diurno, Colegio Nocturno)"
            field: { label: "Pestaña", name: "tab", widget: "string" }
          - { label: "Título del Calendario", name: "calendarTitle", widget: "string" }
          - { label: "Subtítulo del Calendario", name: "calendarSubtitle", widget: "string" }
          - label: "Eventos del Calendario"
            name: "calendarEvents"
            widget: "list"
            hint: "Eventos que se muestran en el calendario académico"
            fields:
              - { label: "Título del evento", name: "title", widget: "string" }
              - { label: "Fecha de inicio", name: "start", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "Fecha de fin", name: "end", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
              - label: "Color"
                name: "color"
                widget: "select"
                options:
                  - { label: "Azul (Institucional)", value: "primary" }
                  - { label: "Naranja (Exámenes)", value: "orange" }
                  - { label: "Rojo (Feriados)", value: "red" }
                  - { label: "Verde (Matrícula)", value: "green" }
          - { label: "Título de Becas", name: "scholarshipTitle", widget: "string" }
          - { label: "Descripción de Becas", name: "scholarshipDescription", widget: "text" }
          - label: "Beneficios de Becas"
            name: "scholarshipBenefits"
            widget: "list"
            field: { label: "Beneficio", name: "benefit", widget: "string" }
          - { label: "Imagen del sidebar", name: "sidebarImage", widget: "image" }
          - { label: "Pie de foto del sidebar", name: "sidebarImageCaption", widget: "string" }
          - label: "Leyenda del Calendario"
            name: "eventLegend"
            widget: "list"
            hint: "Colores y sus significados en el calendario"
            fields:
              - label: "Color"
                name: "color"
                widget: "select"
                options:
                  - { label: "Azul (Institucional)", value: "primary" }
                  - { label: "Naranja (Exámenes)", value: "orange" }
                  - { label: "Rojo (Feriados)", value: "red" }
                  - { label: "Verde (Matrícula)", value: "green" }
              - { label: "Descripción", name: "label", widget: "string" }
          - label: "Colegio Diurno"
            name: "diurno"
            widget: "object"
            fields:
              - { label: "Descripción", name: "description", widget: "text" }
              - { label: "Horario", name: "schedule", widget: "string", hint: "Ej: Lunes a viernes, 7:00 a.m. – 4:00 p.m." }
              - label: "Títulos / Certificaciones"
                name: "competencies"
                widget: "list"
                field: { label: "Título", name: "titulo", widget: "string" }
              - { label: "Texto del botón CTA", name: "ctaLabel", widget: "string" }
              - { label: "Enlace del botón CTA", name: "ctaLink", widget: "string", hint: "Ruta interna, ej: /admissions" }
          - label: "Colegio Nocturno"
            name: "nocturno"
            widget: "object"
            fields:
              - { label: "Descripción", name: "description", widget: "text" }
              - { label: "Horario", name: "schedule", widget: "string", hint: "Ej: Lunes a viernes, 6:00 p.m. – 9:30 p.m." }
              - label: "Especialidades disponibles"
                name: "specialties"
                widget: "list"
                field: { label: "Especialidad", name: "especialidad", widget: "string" }
              - label: "Pasos de inscripción"
                name: "enrollmentSteps"
                widget: "list"
                fields:
                  - { label: "Ícono (Material Symbol)", name: "icon", widget: "string" }
                  - { label: "Título del paso", name: "title", widget: "string" }
                  - { label: "Descripción", name: "description", widget: "text" }

      # Página de Admisiones
      - label: "Página de Admisiones"
        name: "admissions"
        file: "src/content/settings/admissions.json"
        description: "Proceso de matrícula, documentos y formulario de consulta"
        fields:
          - { label: "Imagen del hero", name: "heroImage", widget: "image" }
          - { label: "Título del hero", name: "heroTitle", widget: "string" }
          - { label: "Subtítulo del hero", name: "heroSubtitle", widget: "text" }
          - { label: "Badge del hero", name: "heroBadge", widget: "string", hint: "Ejemplo: Matrícula 2025-2026" }
          - label: "Pasos del proceso de matrícula"
            name: "steps"
            widget: "list"
            hint: "Los 4 pasos del proceso de inscripción"
            fields:
              - { label: "Ícono", name: "icon", widget: "string", hint: "Material Symbol, ej: app_registration" }
              - { label: "Título del paso", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }
          - label: "Categorías de Documentos"
            name: "documents"
            widget: "list"
            hint: "Documentos requeridos agrupados por categoría"
            fields:
              - { label: "Nombre de la categoría", name: "category", widget: "string", hint: "Ejemplo: Identidad y Personal" }
              - label: "Documentos"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Nombre del documento", name: "label", widget: "string" }
                  - { label: "Marcado como completado", name: "isChecked", widget: "boolean", default: false }
          - label: "Opciones de Especialidad"
            name: "specialtyOptions"
            widget: "list"
            hint: "Especialidades disponibles en el formulario de consulta"
            field: { label: "Especialidad", name: "specialty", widget: "string" }
          - { label: "Título del formulario de visita", name: "visitFormTitle", widget: "string", default: "Agendar una Visita" }
          - { label: "Subtítulo del formulario de visita", name: "visitFormSubtitle", widget: "text" }
          - label: "Información del Programa Diurno"
            name: "programDiurno"
            widget: "object"
            fields:
              - { label: "Título de la sección", name: "sectionTitle", widget: "string" }
              - { label: "Descripción del programa", name: "description", widget: "text" }
              - { label: "Metodología", name: "methodology", widget: "text" }
              - label: "Competencias"
                name: "competencies"
                widget: "list"
                field: { label: "Competencia", name: "competencia", widget: "string" }
              - label: "Requisitos de Admisión"
                name: "requirements"
                widget: "list"
                field: { label: "Requisito", name: "requisito", widget: "string" }

      # Página de Becas
      - label: "Página de Becas"
        name: "scholarships"
        file: "src/content/settings/scholarships.json"
        description: "Tipos de becas, requisitos, proceso, plazos, documentación y contacto"
        fields:
          - { label: "Imagen del hero", name: "heroImage", widget: "image", required: false, hint: "Si se deja vacío se muestra un fondo degradado" }
          - { label: "Título del hero", name: "heroTitle", widget: "string" }
          - { label: "Subtítulo del hero", name: "heroSubtitle", widget: "text" }
          - { label: "Badge del hero", name: "heroBadge", widget: "string", hint: "Ejemplo: Apoyos Disponibles" }
          - label: "Tipos de Becas"
            name: "scholarshipTypes"
            widget: "list"
            hint: "Cada tarjeta de beca en la parte superior de la página"
            fields:
              - { label: "ID único (sin espacios)", name: "id", widget: "string", hint: "Identificador interno. Ej: avancemos, beca-rendimiento" }
              - { label: "Ícono (Material Symbol)", name: "icon", widget: "string", hint: "Ej: volunteer_activism, emoji_events, restaurant" }
              - label: "Color de la tarjeta"
                name: "color"
                widget: "select"
                options:
                  - { label: "Azul (primario)", value: "primary" }
                  - { label: "Naranja", value: "orange" }
                  - { label: "Verde", value: "green" }
                  - { label: "Morado", value: "purple" }
              - { label: "Nombre de la beca", name: "name", widget: "string" }
              - { label: "Entidad responsable", name: "entity", widget: "string", hint: "Ej: IMAS / MEP" }
              - { label: "Descripción", name: "description", widget: "text" }
              - { label: "Monto / Beneficio", name: "amount", widget: "string", hint: "Ej: Hasta ₡58.500 mensuales" }
              - { label: "Renovable", name: "renewable", widget: "boolean", default: true }
          - { label: "Título — Requisitos", name: "requirementsSectionTitle", widget: "string", default: "Requisitos por Beca" }
          - { label: "Subtítulo — Requisitos", name: "requirementsSectionSubtitle", widget: "text" }
          - label: "Requisitos por Beca"
            name: "requirements"
            widget: "list"
            hint: "Cada entrada corresponde al ID de una beca declarada arriba"
            fields:
              - { label: "ID de la beca", name: "scholarshipId", widget: "string", hint: "Debe coincidir exactamente con el ID de la beca" }
              - label: "Requisitos"
                name: "items"
                widget: "list"
                field: { label: "Requisito", name: "requisito", widget: "string" }
          - { label: "Título — Proceso", name: "processSectionTitle", widget: "string", default: "Proceso de Solicitud" }
          - { label: "Subtítulo — Proceso", name: "processSectionSubtitle", widget: "text" }
          - label: "Pasos del proceso"
            name: "steps"
            widget: "list"
            fields:
              - { label: "Ícono (Material Symbol)", name: "icon", widget: "string" }
              - { label: "Título del paso", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }
          - { label: "Título — Plazos", name: "deadlinesSectionTitle", widget: "string", default: "Plazos y Fechas Clave" }
          - { label: "Subtítulo — Plazos", name: "deadlinesSectionSubtitle", widget: "text" }
          - label: "Plazos de solicitud"
            name: "deadlines"
            widget: "list"
            fields:
              - { label: "Nombre de la beca", name: "scholarship", widget: "string" }
              - { label: "Período", name: "period", widget: "string", hint: "Ej: Febrero – Marzo" }
              - { label: "Observaciones", name: "notes", widget: "text" }
          - { label: "Título — Documentación", name: "documentsSectionTitle", widget: "string", default: "Documentación Necesaria" }
          - { label: "Subtítulo — Documentación", name: "documentsSectionSubtitle", widget: "text" }
          - label: "Grupos de documentos"
            name: "documentGroups"
            widget: "list"
            fields:
              - { label: "Nombre del grupo", name: "group", widget: "string", hint: "Ej: Documentos Generales" }
              - { label: "Ícono (Material Symbol)", name: "icon", widget: "string", hint: "Ej: person, receipt_long" }
              - label: "Documentos requeridos"
                name: "items"
                widget: "list"
                field: { label: "Documento", name: "documento", widget: "string" }
          - { label: "Título — Contacto", name: "contactSectionTitle", widget: "string", default: "¿Tenés dudas? Contáctanos" }
          - { label: "Subtítulo — Contacto", name: "contactSectionSubtitle", widget: "text" }
          - label: "Tarjetas de contacto"
            name: "contacts"
            widget: "list"
            fields:
              - { label: "Ícono (Material Symbol)", name: "icon", widget: "string" }
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }
              - { label: "Detalle (horario, correo, etc.)", name: "detail", widget: "string" }
              - { label: "Enlace de acción (href)", name: "action", widget: "string", required: false, hint: "Ej: mailto:becas@colegio.ed.cr" }
              - { label: "Texto del botón de acción", name: "actionLabel", widget: "string", required: false }

      # Página de Noticias
      - label: "Página de Noticias (Config)"
        name: "news_settings"
        file: "src/content/settings/news.json"
        description: "Configuración y contenido de la página de Noticias"
        fields:
          - { label: "Título de la página", name: "pageTitle", widget: "string" }
          - label: "Categorías del filtro"
            name: "filterCategories"
            widget: "list"
            hint: "Botones de filtro que aparecen arriba de las noticias"
            fields:
              - { label: "Nombre", name: "label", widget: "string" }
              - { label: "Ícono (Material Symbol)", name: "icon", widget: "string" }
          - label: "Archivo por años"
            name: "archiveYears"
            widget: "list"
            hint: "Años que aparecen en la barra lateral de archivo"
            fields:
              - { label: "Año", name: "year", widget: "string" }
              - label: "Meses"
                name: "months"
                widget: "list"
                required: false
                field: { label: "Mes", name: "month", widget: "string" }
          - { label: "Título de suscripción", name: "subscribeTitle", widget: "string" }
          - { label: "Descripción de suscripción", name: "subscribeDescription", widget: "text" }

      # Página de Bolsa de Empleo
      - label: "Página de Bolsa de Empleo (Config)"
        name: "jobboard"
        file: "src/content/settings/jobboard.json"
        description: "Configuración y ofertas de la Bolsa de Empleo"
        fields:
          - { label: "Título de la página", name: "pageTitle", widget: "string" }
          - { label: "Subtítulo de la página", name: "pageSubtitle", widget: "text" }
          - { label: "Placeholder del buscador", name: "searchPlaceholder", widget: "string" }
          - label: "Áreas de filtro"
            name: "areas"
            widget: "list"
            hint: "Botones de filtro por área técnica"
            field: { label: "Área", name: "area", widget: "string" }
          - { label: "Título CTA empresas", name: "employerCtaTitle", widget: "string" }
          - { label: "Descripción CTA empresas", name: "employerCtaDescription", widget: "text" }
          - { label: "Botón CTA empresas", name: "employerCtaButton", widget: "string" }

      # Página de FAQ
      - label: "Página de Preguntas Frecuentes (Config)"
        name: "faq_settings"
        file: "src/content/settings/faq.json"
        description: "Configuración y preguntas de la página de FAQ"
        fields:
          - { label: "Título principal", name: "heroTitle", widget: "string" }
          - { label: "Subtítulo", name: "heroSubtitle", widget: "text" }
          - { label: "Placeholder del buscador", name: "searchPlaceholder", widget: "string" }
          - label: "Categorías"
            name: "categories"
            widget: "list"
            hint: "Nombres de las categorías de filtro (la primera debe ser 'Todos')"
            field: { label: "Categoría", name: "category", widget: "string" }
          - { label: "Título del CTA de contacto", name: "contactCtaTitle", widget: "string" }
          - { label: "Descripción del CTA", name: "contactCtaDescription", widget: "text" }
          - { label: "Texto del botón de contacto", name: "contactCtaButton", widget: "string" }

      # Página de Contacto
      - label: "Página de Contacto"
        name: "contact"
        file: "src/content/settings/contact.json"
        description: "Información de contacto, horarios y ubicación"
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Subtítulo", name: "subtitle", widget: "text" }
          - label: "Horario de atención"
            name: "officeHours"
            widget: "list"
            fields:
              - { label: "Día", name: "day", widget: "string", hint: "Ejemplo: Lunes — Viernes" }
              - { label: "Horario", name: "hours", widget: "string", hint: "Ejemplo: 7:00 AM - 4:00 PM" }
              - { label: "Cerrado", name: "isClosed", widget: "boolean", default: false }
          - label: "Datos de Contacto"
            name: "contactDetails"
            widget: "list"
            fields:
              - { label: "Ícono", name: "icon", widget: "string", hint: "Material Symbol: call, mail, public" }
              - { label: "Etiqueta", name: "label", widget: "string" }
              - { label: "Valor", name: "value", widget: "string" }
              - { label: "Enlace (href)", name: "href", widget: "string", required: false, hint: "Ejemplo: tel:+50625510000" }
          - { label: "Dirección completa", name: "address", widget: "text" }
