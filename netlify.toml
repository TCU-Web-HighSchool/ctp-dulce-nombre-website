[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — all routes handled by React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# CMS admin path — served as-is from public/admin/
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
